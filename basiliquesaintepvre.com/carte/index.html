    :root {

    html, body {

      background-color: var(--cream);

    .layout {
      display: flex;

      height: 100dvh;

    .panneau {

      overflow: hidden;
      border-right: 1px solid rgba(var(--olive-rgb), 0.1);
      position: relative;
      z-index: 10;

    .panneau::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    .panneau-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid rgba(var(--olive-rgb), 0.1);
      position: relative;
    }

    .panneau-retour {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(var(--olive-rgb), 0.4);
      text-decoration: none;
      margin-bottom: 1.2rem;
      transition: color 0.2s;

    .panneau-retour:hover { color: var(--olive); }
    .panneau-retour svg { width: 14px; height: 6px; overflow: visible; }

    .panneau-surtitre {

      font-size: 0.62rem;
      font-weight: 700;

      color: var(--sage-dark);
      margin-bottom: 0.5rem;
    }

    .panneau-titre {
      font-family: var(--font-titre);
      font-size: 1.9rem;
      color: var(--olive);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .panneau-sous-titre {
      font-size: 0.78rem;
      font-style: italic;
      font-weight: 400;
      color: rgba(var(--olive-rgb), 0.5);
      line-height: 1.5;
    }

    .filtres {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid rgba(var(--olive-rgb), 0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filtre-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      font-family: var(--font-texte);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background-color: var(--cream-2);
      color: rgba(var(--olive-rgb), 0.55);
      border: 1px solid rgba(var(--olive-rgb), 0.1);
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;

    .filtre-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;

    }

      color: var(--olive);

    .liste-lieux {

      padding: 0.5rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--cream-2) transparent;

      align-items: flex-start;
      gap: 1rem;

      top: 0;

      left: 50%;

      color: var(--cream);

        border-right: none;

        z-index: 40;

/* ════════════════════════════════════════════════════
   NAVIGATION INTELLIGENTE — détection plateforme
════════════════════════════════════════════════════ */
function ouvrirNavigation(lat, lng, nom) {
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  let url;

  if (isIOS) {
    // Apple Plans natif via schéma maps://
    url = `maps://?daddr=${lat},${lng}&dirflg=w`;
  } else if (isAndroid) {
    // Intent geo: → ouvre l'app de navigation par défaut (Google Maps, Waze, etc.)
    url = `geo:${lat},${lng}?q=${lat},${lng}(${encodeURIComponent(nom)})`;
  } else {
    // Desktop → Google Maps dans un nouvel onglet
    url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
  }

  window.open(url, '_blank', 'noopener');
}

  },
  {
    id: 'arc-here',
    nom: 'Arc Héré',
    cat: 'patrimoine',
    emoji: '🏛',
    couleur: '#27548A',
    lat: 48.694462837854424,
    lng: 6.18265621566205,
    desc: 'Arc de triomphe de 1754 dédié à Louis XV. Relie la place Stanislas à la place de la Carrière.',
    detail: 'Œuvre d\'Emmanuel Héré, constituant avec la place Stanislas un ensemble classé UNESCO.',
    distance: '≈ 450 m de la basilique'
  }
];

/* ════════════════════════════════════════════════════
   LEAFLET
════════════════════════════════════════════════════ */
const carte = L.map('carte', {
  center: [48.6955, 6.1785],
  zoom: 16,
  zoomControl: false,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(carte);

L.control.zoom({ position: 'bottomright' }).addTo(carte);

/* ════════════════════════════════════════════════════
   MARQUEURS
════════════════════════════════════════════════════ */
function creerIcone(lieu, estActif = false) {
  const taille = lieu.id === 'basilique' ? 44 : 34;
  const couleur = lieu.couleur;
  const ring = estActif
    ? `<circle cx="18" cy="18" r="16" fill="none" stroke="${couleur}" stroke-width="2" opacity="0.4"/>`
    : '';

  return L.divIcon({
    className: '',
    html: `
      <div style="
        width:${taille}px; height:${taille}px;
        background:${couleur};
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 3px 14px rgba(0,0,0,0.25);
        border: 2px solid rgba(255,255,255,0.6);
        transition: all 0.2s;
      ">
        <span style="transform:rotate(45deg); font-size:${lieu.id === 'basilique' ? '1.1rem' : '0.8rem'}; line-height:1;">${lieu.emoji}</span>
      </div>
      ${ring}
    `,
    iconSize: [taille, taille],
    iconAnchor: [taille/2, taille],
    popupAnchor: [0, -taille - 4]
  });
}

const marqueurs = {};
let lieuActif = null;

LIEUX.forEach(lieu => {
  const marqueur = L.marker([lieu.lat, lieu.lng], {
    icon: creerIcone(lieu, false)
  }).addTo(carte);

  // Le popup utilise un bouton avec onclick qui appelle ouvrirNavigation()
  const popupHTML = `
    <div class="popup-inner">
      <span class="popup-cat">${lieu.cat.charAt(0).toUpperCase() + lieu.cat.slice(1)}</span>
      <div class="popup-titre">${lieu.nom}</div>
      <div class="popup-sep"></div>
      <p class="popup-texte">${lieu.detail}</p>
      <span class="popup-distance">${lieu.distance}</span>
      <button
        class="popup-nav"
        onclick="ouvrirNavigation(${lieu.lat}, ${lieu.lng}, '${lieu.nom.replace(/'/g, "\\'")}')">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Y aller
      </button>
    </div>
  `;

  const isMobile = window.innerWidth <= 700;
  marqueur.bindPopup(popupHTML, {
    maxWidth: isMobile ? 250 : 280,
    minWidth: isMobile ? 220 : 260,
    autoPan: true,
    autoPanPaddingTopLeft: L.point(isMobile ? 20 : 360, 60),
    autoPanPaddingBottomRight: L.point(20, isMobile ? 80 : 20)
  });

  marqueur.on('click', () => activerLieu(lieu.id));
  marqueurs[lieu.id] = marqueur;
});

/* ════════════════════════════════════════════════════
   ACTIVATION
════════════════════════════════════════════════════ */
function activerLieu(id) {
  if (lieuActif) {
    marqueurs[lieuActif].setIcon(creerIcone(LIEUX.find(l => l.id === lieuActif), false));
    document.querySelectorAll('.lieu-item').forEach(el => el.classList.remove('actif'));
  }

  lieuActif = id;
  const lieu = LIEUX.find(l => l.id === id);

  marqueurs[id].setIcon(creerIcone(lieu, true));
  marqueurs[id].openPopup();

  const item = document.getElementById('lieu-' + id);
  if (item) {
    item.classList.add('actif');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const isMobile = window.innerWidth <= 700;
  setTimeout(() => {
    carte.setView([lieu.lat, lieu.lng], 17, { animate: true, duration: 0.6 });
  }, 80);
}

/* ════════════════════════════════════════════════════
   LISTE
════════════════════════════════════════════════════ */
function construireListe(filtre = 'tous') {
  const liste = document.getElementById('liste-lieux');
  liste.innerHTML = '';

  const lieux = filtre === 'tous' ? LIEUX : LIEUX.filter(l => l.cat === filtre);

  lieux.forEach(lieu => {
    const item = document.createElement('div');
    item.className = 'lieu-item' + (lieuActif === lieu.id ? ' actif' : '');
    item.id = 'lieu-' + lieu.id;
    item.innerHTML = `
      <div class="lieu-icone" style="background:${lieu.couleur}20; color:${lieu.couleur}">
        ${lieu.emoji}
      </div>
      <div class="lieu-infos">
        <div class="lieu-cat">${lieu.cat}</div>
        <div class="lieu-nom">${lieu.nom}</div>
        <div class="lieu-desc">${lieu.desc}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      activerLieu(lieu.id);
      if (window.innerWidth <= 700) fermerPanneau();
    });
    liste.appendChild(item);
  });
}

/* ════════════════════════════════════════════════════
   FILTRES
════════════════════════════════════════════════════ */
document.querySelectorAll('.filtre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    const cat = btn.getAttribute('data-cat');
    construireListe(cat);

    LIEUX.forEach(lieu => {
      if (cat === 'tous' || lieu.cat === cat) {
        if (!carte.hasLayer(marqueurs[lieu.id])) marqueurs[lieu.id].addTo(carte);
      } else {
        if (carte.hasLayer(marqueurs[lieu.id])) carte.removeLayer(marqueurs[lieu.id]);
      }
    });
  });
});

/* ════════════════════════════════════════════════════
   MOBILE
════════════════════════════════════════════════════ */
function togglePanneau() {
  const panneau = document.getElementById('panneau');
  const btn = document.getElementById('toggle-panneau');
  const estOuvert = panneau.classList.toggle('ouvert');
  btn.textContent = estOuvert ? '✕ Fermer' : '☰ Points d\'intérêt';
}

function fermerPanneau() {
  const panneau = document.getElementById('panneau');
  const btn = document.getElementById('toggle-panneau');
  panneau.classList.remove('ouvert');
  btn.textContent = '☰ Points d\'intérêt';
}

document.getElementById('carte').addEventListener('click', function() {
  if (window.innerWidth <= 700) fermerPanneau();
});

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
construireListe('tous');

setTimeout(() => {
  activerLieu('basilique');
  carte.invalidateSize();
}, 600);

window.addEventListener('resize', () => {
  setTimeout(() => carte.invalidateSize(), 200);
});

L.circle([48.6942, 6.1791], {
  radius: 350,
  color: '#AEB784',
  fillColor: '#AEB784',
  fillOpacity: 0.06,
  weight: 1,
  dashArray: '4 6'
}).addTo(carte);
</script>
</body>
</html>
